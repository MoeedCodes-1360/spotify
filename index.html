<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify clone</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container flex justify-center  bg-black">
      <div class="left rounded bg-grey">
        <div class="home bg-grey m1">
          <img class="invert" src="svg/logo.svg" alt="Spotify logo" />
          <ul>
            <li>
              <img class="invert" src="svg/home.svg" alt="Home icon" />
              Home
            </li>
            <li>
              <img class="invert" src="svg/search.svg" alt="Search icon" />
              Search
            </li>
          </ul>
        </div>
        <div class="library rounded m1 p1 bg-grey">
          <div class="header">
            <img class="invert" src="svg/lib.svg" alt="Library icon" />
            <h2>Your Library</h2>
          </div>
        </div>
        <div class="footer">
          <a href="https://www.spotify.com/pk-en/legal/">Legal</a>

          <a href="https://www.spotify.com/pk-en/safetyandprivacy/">
            Safety &amp; Privacy Center
          </a>

          <a href="https://www.spotify.com/pk-en/legal/privacy-policy/">
            Privacy Policy
          </a>

          <a href="https://www.spotify.com/pk-en/legal/cookies-policy/">
            Cookies
          </a>

          <a href="https://www.spotify.com/pk-en/legal/privacy-policy/#s3">
            About Ads
          </a>

          <a href="https://www.spotify.com/pk-en/accessibility/">
            Accessibility
          </a>

          <a
            href="https://www.spotify.com/legal/cookies-policy/"
            target="_blank"
            rel="noopener"
          >
            <span>Cookies</span>
          </a>
        </div>
      </div>

      <div class="right">
          <div class="heading">
        <div class="nav">
            <img class="invert" src="svg/left.svg" alt="left icon">
            <img  class="invert" src="svg/right.svg" alt="right icon">
            </div>
          <div class="button">
            <button>Sign up</button>
            <button>Log In</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
